name: Java CI with Maven deploy to ec2 Tomcat

on:
  push:
    branches: [ "main" ]

jobs:
  maven-build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn -B package --file pom.xml

    - name: Deploy WAR to Tomcat Webapps via SSH
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "target/*.war"
        target: "/home/ec2-user/apache-tomcat-9.0.120/webapps"
        strip_components: 1

    - name: Restart Tomcat Server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Stop Tomcat
          sh /home/ec2-user/apache-tomcat-9.0.120/bin/shutdown.sh || true
          
          # Optional: Clear old extracted folder to prevent caching conflicts
          # rm -rf /home/ec2-user/apache-tomcat-9.0.120/webapps/YOUR_APP_NAME
          
          # Start Tomcat
          sh /home/ec2-user/apache-tomcat-9.0.120/bin/startup.sh
